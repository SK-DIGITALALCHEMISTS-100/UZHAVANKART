{% extends "uk/base.html" %}
{% block content %}

<style>
  body {
    background: linear-gradient(to right, #fdfbfb, #ebedee);
    font-family: 'Poppins', sans-serif;
  }

  .registration-container {
    max-width: 720px;
    margin: 60px auto;
    padding: 45px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    transition: 0.3s ease-in-out;
  }

  .registration-container:hover {
    transform: scale(1.005);
  }

  .title {
    text-align: center;
    font-size: 2.3rem;
    font-weight: 600;
    color: #2d6a4f;
    margin-bottom: 35px;
    position: relative;
  }

  .title::after {
    content: "";
    width: 70px;
    height: 4px;
    background: #52b788;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: -12px;
    border-radius: 10px;
  }

  .form-floating > .form-control,
  .form-floating > .form-select {
    height: 56px;
    border-radius: 10px;
    border: 1px solid #ccc;
  }

  .form-control:focus {
    border-color: #40916c;
    box-shadow: 0 0 0 0.15rem rgba(64, 145, 108, 0.25);
  }

  .btn-custom {
    background: linear-gradient(to right, #40916c, #2d6a4f);
    color: white;
    padding: 14px;
    font-size: 1.05rem;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    transition: all 0.3s ease-in-out;
  }

  .btn-custom:hover {
    background: #1b4332;
    transform: scale(1.02);
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
  }

  .form-label {
    font-weight: 500;
    color: #333;
  }

  .btn-outline-success {
    font-weight: 500;
    border-radius: 8px;
  }
</style>

<div class="container">
  <div class="registration-container">
    
    <div class="title">EMPLOYEE REGISTRATION</div>

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="form-floating mb-3">
        <input type="text" name="emp_id" id="id_emp_id" class="form-control" placeholder="Employee ID" required>
        <label for="id_emp_id">Employee ID</label>
      </div>

      <div class="form-floating mb-3">
        <input type="text" name="name" id="id_name" class="form-control" placeholder="Full Name" required>
        <label for="id_name">Full Name</label>
      </div>

      <div class="form-floating mb-3">
        <input type="date" name="dob" id="id_dob" class="form-control" placeholder="Date of Birth" required>
        <label for="id_dob">Date of Birth</label>
      </div>

      <div class="mb-3">
        <label class="form-label">Gender</label><br>
        <div class="form-check form-check-inline">
          <input type="radio" name="gender" id="gender_m" value="M" class="form-check-input" required>
          <label for="gender_m" class="form-check-label">Male</label>
        </div>
        <div class="form-check form-check-inline">
          <input type="radio" name="gender" id="gender_f" value="F" class="form-check-input">
          <label for="gender_f" class="form-check-label">Female</label>
        </div>
        <div class="form-check form-check-inline">
          <input type="radio" name="gender" id="gender_o" value="O" class="form-check-input">
          <label for="gender_o" class="form-check-label">Other</label>
        </div>
      </div>

      <div class="form-floating mb-3">
        <input type="text" name="mobile_no" id="id_mobile_no" class="form-control" placeholder="Mobile Number" required>
        <label for="id_mobile_no">Mobile Number</label>
      </div>

      <div class="form-floating mb-3">
        <textarea name="address" id="id_address" class="form-control" placeholder="Address" style="height: 120px;" required></textarea>
        <label for="id_address">Address</label>
      </div>

      <div class="form-floating mb-3">
        <input type="text" name="job_role" id="id_job_role" class="form-control" placeholder="Job Role" required>
        <label for="id_job_role">Job Role</label>
      </div>

      <div class="mb-4">
        <label for="id_photo" class="form-label">Upload Photo <i class="fas fa-upload ms-1"></i></label>
        <input type="file" name="photo" id="id_photo" class="form-control">
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-custom">
          <i class="fas fa-paper-plane me-2"></i> Register Employee
        </button>
      </div>
      <br>
      <div class="d-grid">
        <a href="{% url 'employee-dashboard' %}" class="btn btn-outline-success">
          <i class="fas fa-arrow-left me-1"></i> Back to Dashboard
        </a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
