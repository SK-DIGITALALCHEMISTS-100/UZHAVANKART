{% extends "uk/base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Update Staff</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" value="{{ staff.name }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Phone</label>
            <input type="text" name="phone" value="{{ staff.phone }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Role</label>
            <input type="text" name="role" value="{{ staff.role }}" class="form-control">
        </div>
        <div class="mb-3">
            <label>Address</label>
            <textarea name="address" class="form-control">{{ staff.address }}</textarea>
        </div>
        <div class="mb-3">
            <label>Photo</label><br>
            {% if staff.photo %}
                <img src="{{ staff.photo.url }}" width="100"><br>
            {% endif %}
            <input type="file" name="photo" class="form-control">
        </div>
        <button type="submit" class="btn btn-success">Update</button>
        <a href="{% url 'staff_management' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
