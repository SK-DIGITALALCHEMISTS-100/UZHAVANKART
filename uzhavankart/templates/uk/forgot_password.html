{% extends "uk/customer_base.html" %}
{% load static %}

{% block extra_css %}
<style>
  body {
    background: linear-gradient(135deg, #f0f9f4, #d6f5e3);
  }
  .card {
    border-radius: 20px;
    background: #fff;
  }
  .card h3 {
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  form input, form select, form textarea {
    border-radius: 10px !important;
    padding: 10px;
  }
  .btn-success {
    border-radius: 30px;
    font-weight: 600;
    transition: 0.3s ease-in-out;
  }
  .btn-success:hover {
    background-color: #218838;
    transform: scale(1.05);
  }
  .alert {
    border-radius: 12px;
  }
</style>
{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="col-md-6">
    <div class="card shadow p-4">
      <h3 class="text-center text-warning mb-4">🔒 Forgot Password</h3>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-info text-center">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="d-grid">
          <button type="submit" class="btn btn-success btn-lg">Send OTP</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
