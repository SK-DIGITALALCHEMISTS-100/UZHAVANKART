{% extends "uk/base.html" %}
{% block content %}

<style>
    .category-nav {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 15px;
        padding: 20px 10px;
        margin-top: 20px;
    }

    .category-btn {
        padding: 10px 20px;
        border-radius: 25px;
        border: 1px solid #ccc;
        background-color: #f0f0f0;
        color: #333;
        text-decoration: none;
        font-weight: 600;
        transition: background 0.3s, color 0.3s;
    }

    .category-btn:hover {
        background-color: #c8e6c9;
    }

    .category-btn.active {
        background-color: #2e7d32;
        color: #fff;
        border-color: #2e7d32;
    }

    .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 20px;
        padding: 30px 20px;
        max-width: 1200px;
        margin: 0 auto;
    }

    .product-card {
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
        text-align: center;
        padding: 15px;
        transition: transform 0.3s ease;
    }

    .product-card:hover {
        transform: scale(1.03);
    }

    .product-card img {
        width: 100%;
        height: 130px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 10px;
    }

    .product-name {
        font-weight: 600;
        margin: 8px 0 4px;
        font-size: 1.05rem;
    }

    .product-price {
        color: #1b5e20;
        font-weight: bold;
        font-size: 1.1rem;
    }

    .back-btn {
        margin-bottom: 20px;
    }

    @media (max-width: 600px) {
        .product-card img {
            height: 100px;
        }
        .category-nav {
            padding: 10px 5px;
            gap: 10px;
        }
    }
</style>

<div class="container my-5">
    <!-- Back Button -->
   

    <h2 class="text-center mb-4">MARKET PRICE</h2>

    

    <!-- Category Filter Tabs -->
    <div class="category-nav">
        <a href="?category=All" class="category-btn {% if selected_category == 'All' %}active{% endif %}">All</a>
        {% for cat in categories %}
            <a href="?category={{ cat }}" class="category-btn {% if selected_category == cat %}active{% endif %}">{{ cat }}</a>
        {% endfor %}
    </div>
 <div class="back-btn">
        <a href="{% url 'agent-dashboard' %}" class="btn btn-outline-primary">
            <i class="bi bi-arrow-left-circle"></i> Back
        </a>
    </div>
    <!-- Product Grid -->
    <div class="product-grid">
        {% for product in products %}
            <div class="product-card">
                <img src="{{ product.image.url }}" alt="{{ product.name }}">
                <p class="product-name">{{ product.name }}</p>
                <p class="product-price">₹{{ product.price }}</p>
            </div>
        {% endfor %}
        {% if not products %}
            <p style="text-align:center;">No products found in this category.</p>
        {% endif %}
    </div>
</div>

{% endblock %}
