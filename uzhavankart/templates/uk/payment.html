{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Make Payment</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5 text-center">
    <div class="card shadow p-4">
        <h3 class="mb-3">Scan to Pay ₹{{ amount }}</h3>

        <!-- QR Code from Google Chart API -->
        <img src="https://chart.googleapis.com/chart?cht=qr&chs=250x250&chl={{ upi_url }}" 
             alt="UPI QR Code" class="img-fluid rounded mb-3">

        <!-- Pay Now Button (Mobile) -->
        <a href="{{ upi_url }}" class="btn btn-success w-100 mb-3">Pay Now</a>

        <!-- Simulate Payment Success -->
        <a href="{% url 'payment_success' %}" class="btn btn-primary w-100">I Have Paid</a>
    </div>
</div>

</body>
</html>
