{% extends "uk/base.html" %}
{% block content %}
<style>
    .add-product-container {
        max-width: 520px;
        margin: 40px auto;
        background: white;
        padding: 35px 30px;
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
        background: linear-gradient(to right, #fdfbfb, #ebedee);
    }

    .add-product-container h2 {
        text-align: center;
        color: #2e7d32;
        margin-bottom: 25px;
        font-size: 26px;
        font-weight: 700;
    }

    form label {
        font-weight: 600;
        margin-bottom: 6px;
        display: block;
    }

    form input,
    form select,
    form textarea {
        width: 100%;
        margin-bottom: 18px;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 15px;
        transition: border-color 0.3s ease;
    }

    form input:focus,
    form select:focus,
    form textarea:focus {
        border-color: #2e7d32;
        outline: none;
    }

    button[type="submit"] {
        width: 100%;
        background: #2e7d32;
        color: white;
        padding: 12px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.3s ease;
    }

    button[type="submit"]:hover {
        background: #27672a;
    }

    .back-button {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #2e7d32;
        text-decoration: none;
        font-weight: 600;
        font-size: 15px;
        transition: color 0.3s ease;
    }

    .back-button:hover {
        color: #1b5e20;
    }

    .success {
        background-color: #e6ffe6;
        padding: 12px;
        border-left: 5px solid #2e7d32;
        color: #2e7d32;
        font-weight: 500;
        margin-bottom: 20px;
        border-radius: 4px;
    }
</style>

<div class="add-product-container">
    <h2>Add New Product</h2>

    {% if success %}
        <div class="success">
            ✅ Product added successfully!
        </div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Add Product</button>
    </form>

    <a href="{% url 'market-dashboard' %}" class="back-button">← Back to Product List</a>
</div>
{% endblock %}
