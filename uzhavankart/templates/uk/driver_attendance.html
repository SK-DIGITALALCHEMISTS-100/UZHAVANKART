{% extends "uk/base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Driver Attendance</h2>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Driver ID</label>
            <input type="text" name="driver_id" class="form-control" placeholder="Enter Driver ID" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-control" required>
                <option value="present">Present</option>
                <option value="absent">Absent</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Mark Attendance</button>

           <div class="mt-3">
        <a href="{% url 'hub-dashboard' %}" class="btn btn-secondary">
            ← Back
        </a>
    </div>
    </form>
</div>
{% endblock %}
