{% extends 'uk/base.html' %}

{% block title %}Update Stock | Uzhavan Kart{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card-custom">
            <h2 class="mb-4 text-center text-primary">Update Stock</h2>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-grid mt-3">
                    <button type="submit" class="btn btn-primary btn-lg">Update Stock</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
